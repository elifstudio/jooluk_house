<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jooluk House</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <meta name="description" content="Красивые шарфы для вас — Jooluk House" />
  <meta property="og:type" content="product" />
  <meta property="og:site_name" content="Jooluk House" />
  <meta property="og:title" content="Jooluk House" />
  <meta property="og:description" content="Красивые шарфы для вас — Jooluk House" />
  <meta property="og:image" content="main.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="app" v-cloak>

    <!-- Lightbox -->
    <div v-if="lightboxIndex !== null" class="lightbox" @click="lightboxIndex = null">
      <button class="lightbox-close" @click="lightboxIndex = null" aria-label="Close">&times;</button>
      <button class="lightbox-nav lightbox-prev" @click.stop="lightboxPrev">&#8249;</button>
      <img :src="scarf.images[lightboxIndex]" :alt="scarf ? t(scarf.name) : ''" @click.stop />
      <button class="lightbox-nav lightbox-next" @click.stop="lightboxNext">&#8250;</button>
    </div>

    <!-- Side menu overlay -->
    <div class="menu-overlay" :class="{ active: menuOpen }" @click="menuOpen = false"></div>

    <!-- Slide-in side menu (from left) -->
    <aside class="side-menu" :class="{ open: menuOpen }">
      <div class="side-menu-head">
        <span class="side-menu-label">{{ ui.categories }}</span>
        <button class="menu-close" @click="menuOpen = false" aria-label="Close menu">&times;</button>
      </div>
      <nav>
        <ul>
          <li v-for="cat in categories" :key="cat.id">
            <a :href="'category.html?cat=' + cat.id">{{ t(cat.name) }}</a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Header -->
    <header class="site-header">
      <button class="menu-toggle" @click="menuOpen = true" aria-label="Open menu">
        <img src="icons/menu.svg" alt="" width="22" height="16" />
      </button>
      <a href="index.html">
        <img src="logo.png" alt="Jooluk House" class="site-logo" />
      </a>
      <div class="lang-switcher">
        <button :class="{ active: lang === 'ru' }" @click="setLang('ru')">RU</button>
        <span>|</span>
        <button :class="{ active: lang === 'kg' }" @click="setLang('kg')">KG</button>
      </div>
    </header>

    <!-- Back link -->
    <a :href="backUrl" class="back-link">&#8592; {{ ui.back }}</a>

    <!-- Detail content -->
    <div v-if="scarf" class="detail-wrap">

      <!-- Images panel -->
      <div class="detail-images">
        <div class="detail-thumbs-list">
          <img
            v-for="(img, i) in scarf.images"
            :key="i"
            :src="img"
            :alt="t(scarf.name) + ' ' + (i + 1)"
            class="detail-thumb"
            :class="{ selected: selectedIndex === i }"
            @click="selectedIndex = i"
          />
        </div>
        <div class="detail-main-wrap">
          <img
            :src="scarf.images[selectedIndex]"
            :alt="t(scarf.name)"
            class="detail-main-img"
            @click="openLightbox(selectedIndex)"
          />
        </div>
      </div>

      <!-- Info panel -->
      <div class="detail-info">
        <h1 class="detail-name">{{ t(scarf.name) }}</h1>
        <p class="detail-price">{{ currency }}{{ scarf.price }}</p>
        <p class="detail-desc">{{ t(scarf.description) }}</p>

        <span v-if="!scarf.available" class="detail-unavailable">{{ ui.currentlyUnavailable }}</span>

        <a v-if="scarf.available" :href="whatsappUrl" target="_blank" rel="noopener noreferrer" class="whatsapp-btn">
          <svg class="whatsapp-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
          </svg>
          {{ ui.contactUs }}
        </a>
      </div>

    </div>

    <!-- Footer -->
    <footer class="site-footer">
      <span>&copy; {{ year }} Jooluk House. {{ ui.allRightsReserved }}.</span>
      <div class="footer-social">
        <a :href="instagramUrl" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <img src="icons/instagram.svg" alt="Instagram" width="20" height="20" />
        </a>
        <a :href="'https://wa.me/' + whatsappNumber" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">
          <img src="icons/whatsapp.svg" alt="WhatsApp" width="20" height="20" />
        </a>
      </div>
    </footer>

  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    Vue.createApp({
      data() {
        return {
          menuOpen: false,
          categories: [],
          scarf: null,
          currency: '$',
          whatsappNumber: '',
          instagramUrl: '',
          lang: localStorage.getItem('jooluk_lang') || 'ru',
          allUi: {},
          lightboxIndex: null,
          selectedIndex: 0,
          year: new Date().getFullYear()
        }
      },
      computed: {
        ui() {
          return this.allUi[this.lang] || this.allUi['ru'] || {}
        },
        t() {
          const lang = this.lang
          return (obj) => {
            if (!obj) return ''
            if (typeof obj === 'object') return obj[lang] || obj.ru || ''
            return obj
          }
        },
        whatsappUrl() {
          if (!this.scarf) return '#'
          const name = this.t(this.scarf.name)
          const msg = encodeURIComponent(
            `${this.ui.whatsappMessage} "${name}" — ${this.currency}${this.scarf.price}.`
          )
          return `https://wa.me/${this.whatsappNumber}?text=${msg}`
        },
        backUrl() {
          if (!this.scarf) return 'index.html'
          return `category.html?cat=${this.scarf.categoryId}`
        }
      },
      methods: {
        setLang(l) {
          this.lang = l
          localStorage.setItem('jooluk_lang', l)
          this.updateMeta()
        },
        updateMeta() {
          if (!this.scarf) return
          const name = this.t(this.scarf.name)
          const desc = this.t(this.scarf.description)
          const title = name + ' — Jooluk House'
          const img = this.scarf.images[0] || 'main.jpg'
          document.title = title
          document.querySelector('meta[name="description"]').setAttribute('content', desc)
          document.querySelector('meta[property="og:title"]').setAttribute('content', title)
          document.querySelector('meta[property="og:description"]').setAttribute('content', desc)
          document.querySelector('meta[property="og:image"]').setAttribute('content', img)
        },
        openLightbox(index) {
          this.lightboxIndex = index
        },
        lightboxPrev() {
          this.lightboxIndex = (this.lightboxIndex - 1 + this.scarf.images.length) % this.scarf.images.length
        },
        lightboxNext() {
          this.lightboxIndex = (this.lightboxIndex + 1) % this.scarf.images.length
        }
      },
      async mounted() {
        const params = new URLSearchParams(window.location.search)
        const scarfId = parseInt(params.get('id'))

        const res = await fetch('data/scarfs.json')
        const data = await res.json()

        this.categories = data.categories
        this.currency = data.currencySymbol || '$'
        this.whatsappNumber = data.whatsappNumber || ''
        this.instagramUrl = data.instagramUrl || '#'
        this.allUi = data.ui || {}
        this.scarf = data.scarfs.find(s => s.id === scarfId) || null

        this.updateMeta()
      }
    }).mount('#app')
  </script>
</body>

</html>
